name: Auto Tag and Release on Merge

on:
  push:
    branches:
      - main
    # Don't trigger on tag pushes
    tags-ignore:
      - '*'

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.next_version.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          # Remove 'v' prefix and split into parts
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_TAG"

      - name: Create and push tag
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "Created and pushed tag: $NEW_TAG"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build binaries
        run: make build-all

      - name: Install nfpm
        env:
          NFPM_VERSION: 2.46.3
        run: |
          curl -sSL -o /tmp/nfpm.deb "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build Linux packages
        run: make packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.next_version.outputs.new_tag }}
          files: |
            dist/csm-darwin-amd64
            dist/csm-darwin-arm64
            dist/csm-linux-amd64
            dist/csm-linux-arm64
            dist/csm_*_amd64.deb
            dist/csm_*_arm64.deb
            dist/csm-*.x86_64.rpm
            dist/csm-*.aarch64.rpm
          generate_release_notes: true

      # Update the Homebrew formula directly from the binaries we just built,
      # rather than firing a repository_dispatch that makes the tap re-download
      # and re-hash them. This keeps the whole release in one workflow with one
      # token (HOMEBREW_TAP_PAT, scoped to the tap's contents), so there is no
      # second secret in the tap repo to fall out of sync on rotation.
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
          TAG_NAME: ${{ steps.next_version.outputs.new_tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          BASE_URL="https://github.com/yepzdk/claude-sessions-monitor/releases/download/${TAG_NAME}"

          # Hash the binaries we already built in dist/ — no re-download needed.
          sha_darwin_arm64=$(sha256sum dist/csm-darwin-arm64 | awk '{print $1}')
          sha_darwin_amd64=$(sha256sum dist/csm-darwin-amd64 | awk '{print $1}')
          sha_linux_arm64=$(sha256sum dist/csm-linux-arm64 | awk '{print $1}')
          sha_linux_amd64=$(sha256sum dist/csm-linux-amd64 | awk '{print $1}')

          # Clone the tap using the PAT this workflow already holds.
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/yepzdk/homebrew-tools.git" tap
          cd tap

          # Heredoc body is left-aligned on purpose: cat writes it verbatim, so
          # any leading indentation would end up in the committed formula.
          cat > Formula/csm.rb <<FORMULA_EOF
          class Csm < Formula
            desc "CLI tool to monitor Claude Code sessions"
            homepage "https://github.com/yepzdk/claude-sessions-monitor"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/csm-darwin-arm64"
                sha256 "${sha_darwin_arm64}"
              end
              on_intel do
                url "${BASE_URL}/csm-darwin-amd64"
                sha256 "${sha_darwin_amd64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/csm-linux-arm64"
                sha256 "${sha_linux_arm64}"
              end
              on_intel do
                url "${BASE_URL}/csm-linux-amd64"
                sha256 "${sha_linux_amd64}"
              end
            end

            def install
              bin.install Dir["*"].first => "csm"
            end

            test do
              assert_match "csm version", shell_output("#{bin}/csm -v")
            end
          end
          FORMULA_EOF
          # Strip the YAML `run:` block indentation that the heredoc captured,
          # leaving the formula's own 2-space Ruby indentation intact.
          sed -i 's/^          //' Formula/csm.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/csm.rb
          # No-op releases (re-run on an unchanged formula) are a clean success,
          # not a failed commit.
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date for ${TAG_NAME}"
          else
            git commit -m "Update csm formula to ${TAG_NAME}"
            git push
            echo "Homebrew formula updated to ${TAG_NAME}"
          fi
