name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false  # No external dependencies

      - name: Build binaries
        run: make build-all

      - name: Install nfpm
        env:
          NFPM_VERSION: 2.46.3
        run: |
          curl -sSL -o /tmp/nfpm.deb "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build Linux packages
        run: make packages

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/csm-darwin-amd64
            dist/csm-darwin-arm64
            dist/csm-linux-amd64
            dist/csm-linux-arm64
            dist/csm_*_amd64.deb
            dist/csm_*_arm64.deb
            dist/csm-*.x86_64.rpm
            dist/csm-*.aarch64.rpm
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token $HOMEBREW_TAP_PAT" \
            https://api.github.com/repos/yepzdk/homebrew-tools/dispatches \
            -d "{\"event_type\":\"update-csm\",\"client_payload\":{\"version\":\"$VERSION\"}}"

  release-menubar:
    needs: release
    uses: ./.github/workflows/release-menubar.yaml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
